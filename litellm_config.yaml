# If you see OpenRouter/Google error 499 "CANCELLED": the upstream call was aborted
# (browser closed SSE, idle timeout, user navigated away) or Google cancelled a stuck
# request. Retries below help transient cases; client-side aborts will still fail.

.custom_openai_shared: &custom_openai_shared
  api_base: os.environ/CUSTOM_OPENAI_BASE_URL
  api_key: os.environ/CUSTOM_OPENAI_API_KEY
  custom_llm_provider: openai
  timeout: 600
  stream_timeout: 600
  extra_headers:
    X-Title: "Kady-Expert"

model_list:
  # ── Direct Gemini expert proxies on the custom OpenAI-compatible endpoint ──
  - model_name: gemini-3-pro-proxy
    litellm_params:
      <<: *custom_openai_shared
      model: gemini-3-pro-proxy
  - model_name: gemini-3-flash-proxy
    litellm_params:
      <<: *custom_openai_shared
      model: gemini-3-flash-proxy
  - model_name: gemini-2.5-pro-proxy
    litellm_params:
      <<: *custom_openai_shared
      model: gemini-2.5-pro-proxy
  - model_name: gemini-3.1-flash-lite-preview-proxy
    litellm_params:
      <<: *custom_openai_shared
      model: gemini-3.1-flash-lite-preview-proxy

  # ── Custom OpenAI-compatible endpoint ──
  # Routes any `custom/<model>` id picked in the UI to one env-configured
  # OpenAI-compatible upstream. The callback patch strips the `custom/`
  # prefix before dispatch so the upstream sees the bare model id.
  - model_name: "custom/*"
    litellm_params:
      model: "custom/*"
      api_base: os.environ/CUSTOM_OPENAI_BASE_URL
      api_key: os.environ/CUSTOM_OPENAI_API_KEY
      custom_llm_provider: openai
      timeout: 600
      stream_timeout: 600
      extra_headers:
        X-Title: "Kady-Expert"

  # ── Local Ollama (no API key required) ──
  - model_name: "ollama/*"
    litellm_params:
      model: "ollama_chat/*"
      api_base: os.environ/OLLAMA_BASE_URL
      timeout: 600
      stream_timeout: 600

router_settings:
  num_retries: 4
  model_group_alias:
    "gemini-2.5-pro": "gemini-2.5-pro-proxy"
    "gemini-2.5-flash": "gemini-3-flash-proxy"
    "gemini-2.5-flash-lite": "gemini-3.1-flash-lite-preview-proxy"
    "gemini-3-pro-preview": "gemini-3-pro-proxy"
    "gemini-3.1-pro-preview": "gemini-3-pro-proxy"
    "gemini-3.1-pro-preview-customtools": "gemini-3-pro-proxy"
    "gemini-3-flash-preview": "gemini-3-flash-proxy"
    "gemini-3-flash-preview-customtools": "gemini-3-flash-proxy"
    "gemini-3.1-flash-lite-preview": "gemini-3.1-flash-lite-preview-proxy"
    "gemini-3.1-flash-lite-preview-customtools": "gemini-3.1-flash-lite-preview-proxy"

general_settings:
  master_key: sk-litellm-local

litellm_settings:
  callbacks: ["litellm_callbacks.proxy_handler_instance"]
  drop_params: true
